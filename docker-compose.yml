version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: banking-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: banking
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: banking-backend
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/banking?schema=public
      JWT_SECRET: "replace-me"
      JWT_EXPIRES_IN: "1h"
      FRAUD_SCORE_THRESHOLD: "70"
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    container_name: banking-frontend
    environment:
      VITE_API_URL: "http://localhost:4000"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
